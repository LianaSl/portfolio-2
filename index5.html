<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сертификаты</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Raleway:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style5.css">
</head>
<body>

    <div class="bg-texture"></div>

    <header class="page-header">
        <h1 class="title"> <span>Moje Cerifikaty</span></h1>
        <p class="subtitle"></p>
        <div class="divider"></div>
    </header>

    <section class="gallery">

        <article class="cert-card" style="--delay: 0s">
            <div class="card-inner">
                <div class="card-shine"></div>
                <img src="SDA.png" alt="Сертификат №1">
                <div class="card-overlay">
                    <span class="cert-label">01</span>
                </div>
            </div>
            <p class="cert-title">Сертификат №1</p>
        </article>

        <article class="cert-card" style="--delay: 0.15s">
            <div class="card-inner">
                <div class="card-shine"></div>
                <img src="c2.png" alt="CERTIFICAT STEPIK">
                <div class="card-overlay">
                    <span class="cert-label">02</span>
                </div>
            </div>
            <p class="cert-title">Сертификат №2</p>
        </article>

        <article class="cert-card" style="--delay: 0.3s">
            <div class="card-inner">
                <div class="card-shine"></div>
                <img src="c3.png" alt="Сертификат 3">
                <div class="card-overlay">
                    <span class="cert-label">03</span>
                </div>
            </div>
            <p class="cert-title">Сертификат №3</p>
        </article>

        <article class="cert-card" style="--delay: 0.45s">
            <div class="card-inner">
                <div class="card-shine"></div>
                <img src="c4.png" alt="Сертификат 4">
                <div class="card-overlay">
                    <span class="cert-label">04</span>
                </div>
            </div>
            <p class="cert-title">Сертификат №4</p>
        </article>

    </section>

</body>
</html>
